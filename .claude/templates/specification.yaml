# ============================================================
# CODE GENERATION PIPELINE — SPECIFICATION TEMPLATE
# Version: 1.0.0
#
# Instructions:
#   1. Fill in every field below
#   2. Save this file as: pipeline/spec.yaml
#   3. Run /intake to validate before proceeding
#
# Validation rules are enforced by Gate 1. Incomplete or
# ambiguous specifications are rejected automatically.
# ============================================================

# ── FIELD 1: Task Statement ──────────────────────────────────
# A single, imperative sentence describing what to build.
# Max 280 characters. No ambiguous terms (fast, secure, good).
# Example: "Implement a rate limiter that enforces per-user
#           request quotas using a sliding window algorithm."
task_statement: ""

# ── FIELD 2: Functional Requirements ─────────────────────────
# Observable behaviours the code MUST exhibit.
# Minimum 3 requirements. Each must start with an action verb.
# Include both happy-path and error-path requirements.
functional_requirements:
  - "Accepts <input> and returns <output>"
  - "Validates <condition> and rejects <invalid input> with <specific error>"
  - "Handles <error scenario> by <specific behaviour>"
  # Add more requirements as needed...

# ── FIELD 3: Non-Functional Requirements ─────────────────────
# Performance, reliability, and constraint requirements.
# Each NFR MUST include a measurable threshold.
non_functional_requirements:
  - "p99 latency must be < 100ms under 1000 concurrent requests"
  - "Memory footprint must not exceed 256MB under normal load"
  - "Must achieve 99.9% availability (< 8.7 hours downtime/year)"
  # Add security, compliance, scalability NFRs as needed...

# ── FIELD 4: Target Language & Runtime ───────────────────────
# Language, version, and runtime environment.
# language options: python, typescript, javascript, go, rust, java, kotlin
target_language:
  language: python           # e.g., python, typescript, go
  version: ">=3.11"         # e.g., ">=3.11", ">=18.0", ">=1.21"
  runtime: ""               # e.g., "AWS Lambda", "Docker/Linux", "Node.js 20 LTS"
  framework: ""             # e.g., "FastAPI", "Express", "none"

# ── FIELD 5: Codebase Context ─────────────────────────────────
# Relevant interfaces, types, schemas, or modules from the
# existing codebase. Provide as file paths or inline code.
# Max ~4,000 tokens. Omit if this is a greenfield project.
codebase_context: |
  # Paste relevant interface definitions, type stubs, or
  # data models here. Example:
  #
  # class UserRepository(Protocol):
  #     def get_by_id(self, user_id: UUID) -> User | None: ...
  #     def save(self, user: User) -> None: ...
  #
  # Or reference files:
  # See: src/domain/user.py, src/ports/repositories.py

# ── FIELD 6: Security Classification ─────────────────────────
# Data sensitivity level. Must be one of:
#   PUBLIC      — No sensitive data; publicly accessible
#   INTERNAL    — Internal use only; no PII or secrets
#   CONFIDENTIAL — Contains PII, credentials, or business secrets
#   RESTRICTED  — Highest sensitivity; requires dual review
security_classification: "INTERNAL"

# What data does this component process? (Be specific)
data_types_processed:
  - ""  # e.g., "user email addresses", "session tokens", "financial amounts"

# ── FIELD 7: Acceptance Criteria ──────────────────────────────
# Binary, testable conditions that define a passing implementation.
# Minimum 2 criteria. Use Given/When/Then or assert/verify form.
acceptance_criteria:
  - |
    Given: <precondition>
    When:  <action is performed>
    Then:  <expected observable outcome>
  - |
    Given: <error precondition>
    When:  <invalid action is attempted>
    Then:  <expected error response with specific code/message>
  # Add more criteria to achieve full behavioural coverage...

# ── OPTIONAL: Additional Context ──────────────────────────────

# Dependencies already approved for use (skip dep hygiene check)
approved_dependencies: []
  # - name: fastapi
  #   version: "0.115.0"
  #   reason: "Already in use across the service layer"

# Files that integration tests should NOT modify
protected_resources: []
  # - "production database"
  # - "external payment API (use sandbox)"

# Human reviewers (required for CONFIDENTIAL/RESTRICTED)
reviewers: []
  # - name: "Jane Smith"
  #   role: "Security Lead"

# Pipeline configuration overrides (optional — uses settings.json defaults)
pipeline_overrides: {}
  # coverage_line_threshold: 90
  # complexity_flag_above: 8
